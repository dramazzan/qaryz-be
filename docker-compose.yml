services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BACKEND_PORT: "4000"
      PORT: "4000"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:3000}"
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      BACKEND_URL: "http://backend:4000"
      BACKEND_PUBLIC_ORIGIN: "${BACKEND_PUBLIC_ORIGIN:-http://localhost:4000}"
      NEXT_PUBLIC_BACKEND_ORIGIN: "${BACKEND_PUBLIC_ORIGIN:-http://localhost:4000}"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
